# 部署服务器到自有服务器（通过 SSH）
name: Deploy Server to Production

on:
  # 推送到 main 分支时触发
  push:
    branches: [ main, master ]
    paths:
      - '/**'
      - '.github/workflows/deploy-server.yml'
  
  # 手动触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          echo "🚀 开始部署到服务器 ${{ secrets.SERVER_HOST }}"
          
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            echo "[1/5] 进入项目目录..."
            cd /opt/timer-server/timer-server
            
            echo "[2/5] 拉取最新代码..."
            git pull origin main
            
            echo "[3/5] 安装依赖..."
            npm install --production
            
            echo "[4/5] 重启服务..."
            sudo systemctl restart timer-server
            
            echo "[5/5] 检查服务状态..."
            sleep 2
            if systemctl is-active --quiet timer-server; then
              echo "✅ 服务运行正常"
            else
              echo "❌ 服务启动失败"
              exit 1
            fi
            
            echo "✅ 部署完成！"
          EOF

      - name: Health check
        run: |
          echo "🏥 进行健康检查..."
          sleep 3
          curl -f http://${{ secrets.SERVER_HOST }}:3000/health || exit 1
          echo "✅ 健康检查通过"

      - name: Notify success
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "🌐 服务地址: http://${{ secrets.SERVER_HOST }}:3000"
